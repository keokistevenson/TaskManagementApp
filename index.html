<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
    <title>Task Manager</title>

    <script defer src="app.js"></script>
</head>

<body>
    <h1>Task Manager</h1>
    <input id="txtTaskName" type="text">
    <select id="ddlCategory" type="text">Select Category</select>
    <select id="ddlStatus" type="text"></select>
    <input id="calDeadline" type="date">

    <button id="btnAddTask">Add Task</button>

    <ul id="taskList">
        <li>
            <div class="card">
                <h3>Finish Resume</h3>

                <p>
                    <span class="wrapper">
                        <select class="ddlChangeCategory">
                            <option>Personal</option>
                            <option>Work</option>
                            <option>Health</option>
                            <option>Education</option>
                            <option>Finance</option>

                        </select>
                    </span>
                    • Due: <input type="date" class="calChangeDeadline" value="2026-03-25">

                </p>

                <footer>
                    <select class="ddlChangeStatus">
                        <option>In Progress</option>
                        <option>Completed</option>
                    </select>

                    <button class="btnDelete">Delete</button>
                </footer>
            </div>
        </li>
    </ul>

</body>

</html>
