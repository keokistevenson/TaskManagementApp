<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
    <title>Task Manager</title>

    <script defer src="app.js"></script>
</head>

<body>
    <h1>Task Manager</h1>
    <div id="createTaskWapper">
        <label for="txtTaskName">Task Name:</label>
        <input id="txtTaskName" type="text" placeholder="Enter a task.">

        <label for="ddlCategory">Category:</label>
        <select id="ddlCategory" type="text"></select>

        <label for="calDeadline">Deadline:</label>
        <input id="calDeadline" type="date">

        <button id="btnAddTask">Add Task</button>
    </div>

    <div id="filterTaskWapper">
        <label for="ddlFilterStatus">Filter Status:</label>
        <select id="ddlFilterStatus" type="text"></select>

         <label for="ddlFilterCategory">Filter Category:</label>
        <select id="ddlFilterCategory" type="text"></select>
    </div>

    <ul id="lstTaskList"></ul>

</body>

</html>
